<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cistercian SVG API Demo</title>
    <style>
      :root {
        --bg: #e9ece6;
        --bg-top: #e9ece6;
        --panel: rgba(250, 247, 241, 0.96);
        --ink: #1d1b18;
        --muted: #5f584e;
        --line: #cfc6b7;
        --accent: #3f372f;
        --font-ui:
          "Hiragino Sans", "Yu Gothic UI", "Yu Gothic", "Meiryo", system-ui,
          -apple-system, BlinkMacSystemFont, sans-serif;
        --font-display:
          "Iowan Old Style", "Palatino Linotype", "Hiragino Mincho ProN",
          "Yu Mincho", "Noto Serif JP", serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: var(--font-ui);
        color: var(--ink);
        line-height: 1.6;
        background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg) 100%);
      }

      main {
        width: min(960px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 48px 0 64px;
      }

      .hero {
        margin-bottom: 28px;
      }

      .topbar {
        display: flex;
        justify-content: flex-end;
        margin-bottom: 18px;
      }

      .toolbar-group {
        display: inline-flex;
        gap: 6px;
        padding: 4px;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: rgba(255, 252, 246, 0.9);
      }

      .toolbar-group button {
        border: 0;
        border-radius: 6px;
        padding: 8px 12px;
        font: inherit;
        color: var(--muted);
        background: transparent;
        cursor: pointer;
      }

      .toolbar-group button[aria-pressed="true"] {
        color: var(--ink);
        background: rgba(63, 55, 47, 0.1);
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(2rem, 4.8vw, 3.6rem);
        font-family: var(--font-display);
        font-weight: 600;
        line-height: 1;
        letter-spacing: -0.03em;
      }

      .lede {
        margin: 0;
        max-width: 44rem;
        font-size: 1.05rem;
        line-height: 1.7;
        text-wrap: pretty;
        color: var(--muted);
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(280px, 360px) minmax(320px, 1fr);
        gap: 20px;
      }

      .panel {
        padding: 22px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--panel);
        box-shadow: 0 8px 18px rgba(29, 27, 24, 0.04);
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-size: 0.9rem;
        font-weight: 600;
        letter-spacing: 0.01em;
        color: var(--muted);
      }

      input {
        width: 100%;
        padding: 14px 16px;
        border: 1px solid var(--line);
        border-radius: 8px;
        font: inherit;
        color: var(--ink);
        background: rgba(255, 255, 255, 0.92);
      }

      input:focus {
        outline: 2px solid rgba(63, 55, 47, 0.16);
        outline-offset: 2px;
      }

      .controls {
        display: grid;
        gap: 16px;
      }

      .hint {
        margin: 8px 0 0;
        font-size: 0.88rem;
        line-height: 1.6;
        color: var(--muted);
      }

      .preview {
        display: grid;
        place-items: center;
        min-height: 420px;
        padding: 28px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background:
          linear-gradient(
            180deg,
            rgba(255, 255, 255, 0.5),
            rgba(255, 255, 255, 0.5)
          ),
          repeating-linear-gradient(
            0deg,
            transparent 0,
            transparent 23px,
            rgba(63, 55, 47, 0.06) 24px
          );
      }

      .preview img {
        width: min(100%, 320px);
        max-height: 360px;
        object-fit: contain;
        filter: drop-shadow(0 18px 32px rgba(29, 27, 24, 0.12));
      }

      .meta {
        display: grid;
        gap: 12px;
        margin-top: 16px;
      }

      .meta code,
      .meta a {
        display: block;
        overflow-wrap: anywhere;
        color: var(--accent);
      }

      code {
        font-family:
          "SFMono-Regular", "SF Mono", "Cascadia Code", "JetBrains Mono",
          "Consolas", "Liberation Mono", monospace;
      }

      .error {
        min-height: 1.2em;
        color: #9a2d28;
        font-size: 0.92rem;
      }

      .examples {
        margin-top: 20px;
      }

      .examples h2 {
        margin: 0 0 12px;
        font-size: 1rem;
        font-family: var(--font-display);
        font-weight: 600;
      }

      .example-links {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .example-links a {
        padding: 10px 14px;
        border: 1px solid var(--line);
        border-radius: 8px;
        color: var(--accent);
        text-decoration: none;
        background: rgba(255, 255, 255, 0.82);
      }

      .sample-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
        margin-top: 14px;
      }

      .sample-card {
        padding: 14px 10px 12px;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.8);
        text-align: center;
      }

      .sample-card img {
        width: 100%;
        max-width: 82px;
        height: 124px;
        object-fit: contain;
      }

      .sample-card code {
        display: block;
        margin-top: 8px;
        color: var(--muted);
        font-size: 0.88rem;
      }

      @media (max-width: 760px) {
        main {
          padding-top: 28px;
        }

        .layout {
          grid-template-columns: 1fr;
        }

        .preview {
          min-height: 300px;
        }

        .sample-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="topbar">
        <div class="toolbar-group" role="group" aria-label="Language switcher">
          <button type="button" data-locale="ja" aria-pressed="false">
            JA
          </button>
          <button type="button" data-locale="en" aria-pressed="false">
            EN
          </button>
        </div>
      </div>

      <section class="hero">
        <h1 data-i18n="title">Cistercian SVG API</h1>
        <p class="lede" data-i18n="lede">
          `0..9999` の整数から、シトー修道士数字の SVG を返す小さな API
          のデモです。 0埋め入力もそのまま試せます。
        </p>
      </section>

      <section class="layout">
        <form class="panel controls" id="controls">
          <div>
            <label for="value" data-i18n="valueLabel">Value</label>
            <input
              id="value"
              name="value"
              inputmode="numeric"
              value="1987"
              maxlength="4"
            />
            <p class="hint" data-i18n="valueHint">
              `7`, `007`, `1987` のように入力できます。
            </p>
          </div>

          <div>
            <label for="color" data-i18n="colorLabel">Color</label>
            <input id="color" name="color" value="#1d1b18" />
          </div>

          <div>
            <label for="stroke" data-i18n="strokeLabel">Stroke</label>
            <input id="stroke" name="stroke" inputmode="numeric" value="6" />
          </div>

          <div>
            <label for="size" data-i18n="sizeLabel">Size</label>
            <input id="size" name="size" inputmode="numeric" value="256" />
          </div>

          <div class="meta">
            <div>
              <label data-i18n="apiUrlLabel">API URL</label>
              <a id="api-link" href="/1987">/1987</a>
            </div>
            <div>
              <label data-i18n="normalizedLabel">Normalized</label>
              <code id="normalized-value">1987</code>
            </div>
            <div class="error" id="error"></div>
          </div>
        </form>

        <div class="panel">
          <div class="preview">
            <img
              id="preview"
              src="/1987?size=256&stroke=6"
              alt="Cistercian numeral preview"
            />
          </div>

          <section class="examples">
            <h2 data-i18n="examplesTitle">Sample values</h2>
            <div class="example-links">
              <a href="#value=0123">0123</a>
              <a href="#value=4567">4567</a>
              <a href="#value=8901">8901</a>
              <a href="#value=0007">0007</a>
              <a href="#value=1987">1987</a>
              <a href="#value=9999">9999</a>
            </div>
            <div class="sample-grid">
              <a class="sample-card" href="#value=0123">
                <img src="/0123?size=160&stroke=6" alt="0123" />
                <code>0123</code>
              </a>
              <a class="sample-card" href="#value=4567">
                <img src="/4567?size=160&stroke=6" alt="4567" />
                <code>4567</code>
              </a>
              <a class="sample-card" href="#value=8901">
                <img src="/8901?size=160&stroke=6" alt="8901" />
                <code>8901</code>
              </a>
              <a class="sample-card" href="#value=0007">
                <img src="/0007?size=160&stroke=6" alt="0007" />
                <code>0007</code>
              </a>
              <a class="sample-card" href="#value=1987">
                <img src="/1987?size=160&stroke=6" alt="1987" />
                <code>1987</code>
              </a>
              <a class="sample-card" href="#value=9999">
                <img src="/9999?size=160&stroke=6" alt="9999" />
                <code>9999</code>
              </a>
            </div>
          </section>
        </div>
      </section>
    </main>

    <script>
      const form = document.getElementById("controls");
      const preview = document.getElementById("preview");
      const apiLink = document.getElementById("api-link");
      const normalizedValue = document.getElementById("normalized-value");
      const error = document.getElementById("error");
      const localeButtons = Array.from(
        document.querySelectorAll("[data-locale]"),
      );
      const messages = {
        ja: {
          title: "Cistercian SVG API",
          lede: "`0..9999` の整数から、シトー修道士数字の SVG を返す小さな API のデモです。0埋め入力もそのまま試せます。",
          valueLabel: "Value",
          valueHint: "`7`, `007`, `1987` のように入力できます。",
          colorLabel: "Color",
          strokeLabel: "Stroke",
          sizeLabel: "Size",
          apiUrlLabel: "API URL",
          normalizedLabel: "Normalized",
          examplesTitle: "サンプル",
          inputError: "value は 1 桁以上 4 桁以下の数字で入力してください。",
        },
        en: {
          title: "Cistercian SVG API",
          lede: "A small demo for an API that returns Cistercian numeral SVGs from integers in `0..9999`. Zero-padded input works as-is.",
          valueLabel: "Value",
          valueHint: "Try values like `7`, `007`, or `1987`.",
          colorLabel: "Color",
          strokeLabel: "Stroke",
          sizeLabel: "Size",
          apiUrlLabel: "API URL",
          normalizedLabel: "Normalized",
          examplesTitle: "Samples",
          inputError: "Enter 1 to 4 numeric digits for value.",
        },
      };
      let locale = "ja";

      function applyLocale(nextLocale) {
        locale = messages[nextLocale] ? nextLocale : "ja";
        document.documentElement.lang = locale;

        document.querySelectorAll("[data-i18n]").forEach((node) => {
          node.textContent = messages[locale][node.dataset.i18n];
        });

        localeButtons.forEach((button) => {
          button.setAttribute(
            "aria-pressed",
            String(button.dataset.locale === locale),
          );
        });
      }

      function updatePreview() {
        const value = form.value.value.trim();
        const color = form.color.value.trim();
        const stroke = form.stroke.value.trim();
        const size = form.size.value.trim();

        if (!/^\d{1,4}$/.test(value)) {
          error.textContent = messages[locale].inputError;
          return;
        }

        error.textContent = "";

        const normalized = String(Number.parseInt(value, 10));
        normalizedValue.textContent = normalized.padStart(4, "0");

        const params = new URLSearchParams({
          value,
          color,
          stroke,
          size,
        });

        const query = new URLSearchParams({
          color,
          stroke,
          size,
        });
        const url = `/${encodeURIComponent(value)}?${query.toString()}`;
        preview.src = url;
        apiLink.href = url;
        apiLink.textContent = url;
      }

      function applyHashValue() {
        const hash = new URLSearchParams(location.hash.slice(1));
        const value = hash.get("value");

        if (value && /^\d{1,4}$/.test(value)) {
          form.value.value = value;
        }
      }

      form.addEventListener("input", updatePreview);
      localeButtons.forEach((button) => {
        button.addEventListener("click", () => {
          applyLocale(button.dataset.locale);
          updatePreview();
        });
      });
      window.addEventListener("hashchange", () => {
        applyHashValue();
        updatePreview();
      });

      applyLocale(
        navigator.language.toLowerCase().startsWith("ja") ? "ja" : "en",
      );
      applyHashValue();
      updatePreview();
    </script>
  </body>
</html>
