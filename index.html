<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cistercian SVG API Demo</title>
    <style>
      :root {
        --bg: #f4efe7;
        --panel: rgba(255, 252, 246, 0.88);
        --ink: #1d1b18;
        --muted: #70665a;
        --line: #d7cab8;
        --accent: #8b5e34;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top, rgba(139, 94, 52, 0.14), transparent 34%),
          linear-gradient(180deg, #f8f3ea 0%, var(--bg) 100%);
      }

      main {
        width: min(960px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 48px 0 64px;
      }

      .hero {
        margin-bottom: 28px;
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(2.4rem, 6vw, 4.8rem);
        line-height: 0.95;
        letter-spacing: -0.04em;
      }

      .lede {
        margin: 0;
        max-width: 44rem;
        font-size: 1.05rem;
        line-height: 1.7;
        color: var(--muted);
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(280px, 360px) minmax(320px, 1fr);
        gap: 20px;
      }

      .panel {
        padding: 22px;
        border: 1px solid rgba(139, 94, 52, 0.14);
        border-radius: 24px;
        background: var(--panel);
        backdrop-filter: blur(14px);
        box-shadow: 0 18px 42px rgba(61, 42, 24, 0.08);
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-size: 0.9rem;
        color: var(--muted);
      }

      input {
        width: 100%;
        padding: 14px 16px;
        border: 1px solid var(--line);
        border-radius: 14px;
        font: inherit;
        color: var(--ink);
        background: rgba(255, 255, 255, 0.86);
      }

      input:focus {
        outline: 2px solid rgba(139, 94, 52, 0.24);
        outline-offset: 2px;
      }

      .controls {
        display: grid;
        gap: 16px;
      }

      .hint {
        margin: 8px 0 0;
        font-size: 0.88rem;
        line-height: 1.6;
        color: var(--muted);
      }

      .preview {
        display: grid;
        place-items: center;
        min-height: 420px;
        padding: 28px;
        border-radius: 24px;
        background:
          linear-gradient(135deg, rgba(139, 94, 52, 0.08), rgba(255, 255, 255, 0.3)),
          repeating-linear-gradient(
            0deg,
            transparent 0,
            transparent 23px,
            rgba(139, 94, 52, 0.05) 24px
          );
      }

      .preview img {
        width: min(100%, 320px);
        aspect-ratio: 1;
        filter: drop-shadow(0 18px 32px rgba(29, 27, 24, 0.12));
      }

      .meta {
        display: grid;
        gap: 12px;
        margin-top: 16px;
      }

      .meta code,
      .meta a {
        display: block;
        overflow-wrap: anywhere;
        color: var(--accent);
      }

      .error {
        min-height: 1.2em;
        color: #9a2d28;
        font-size: 0.92rem;
      }

      @media (max-width: 760px) {
        main {
          padding-top: 28px;
        }

        .layout {
          grid-template-columns: 1fr;
        }

        .preview {
          min-height: 300px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="hero">
        <h1>Cistercian SVG API</h1>
        <p class="lede">
          `0..9999` の整数から、シトー修道士数字の SVG を返す小さな API のデモです。
          0埋め入力もそのまま試せます。
        </p>
      </section>

      <section class="layout">
        <form class="panel controls" id="controls">
          <div>
            <label for="value">Value</label>
            <input id="value" name="value" inputmode="numeric" value="1987" maxlength="4" />
            <p class="hint">`7`, `007`, `1987` のように入力できます。</p>
          </div>

          <div>
            <label for="color">Color</label>
            <input id="color" name="color" value="#1d1b18" />
          </div>

          <div>
            <label for="stroke">Stroke</label>
            <input id="stroke" name="stroke" inputmode="numeric" value="8" />
          </div>

          <div>
            <label for="size">Size</label>
            <input id="size" name="size" inputmode="numeric" value="256" />
          </div>

          <div class="meta">
            <div>
              <label>API URL</label>
              <a id="api-link" href="/api/cistercian?value=1987">/api/cistercian?value=1987</a>
            </div>
            <div>
              <label>Normalized</label>
              <code id="normalized-value">1987</code>
            </div>
            <div class="error" id="error"></div>
          </div>
        </form>

        <div class="panel">
          <div class="preview">
            <img id="preview" src="/api/cistercian?value=1987&size=256" alt="Cistercian numeral preview" />
          </div>
        </div>
      </section>
    </main>

    <script>
      const form = document.getElementById("controls");
      const preview = document.getElementById("preview");
      const apiLink = document.getElementById("api-link");
      const normalizedValue = document.getElementById("normalized-value");
      const error = document.getElementById("error");

      function updatePreview() {
        const value = form.value.value.trim();
        const color = form.color.value.trim();
        const stroke = form.stroke.value.trim();
        const size = form.size.value.trim();

        if (!/^\d{1,4}$/.test(value)) {
          error.textContent = "value は 1 桁以上 4 桁以下の数字で入力してください。";
          return;
        }

        error.textContent = "";

        const normalized = String(Number.parseInt(value, 10));
        normalizedValue.textContent = normalized.padStart(4, "0");

        const params = new URLSearchParams({
          value,
          color,
          stroke,
          size,
        });

        const url = `/api/cistercian?${params.toString()}`;
        preview.src = url;
        apiLink.href = url;
        apiLink.textContent = url;
      }

      form.addEventListener("input", updatePreview);
      updatePreview();
    </script>
  </body>
</html>
